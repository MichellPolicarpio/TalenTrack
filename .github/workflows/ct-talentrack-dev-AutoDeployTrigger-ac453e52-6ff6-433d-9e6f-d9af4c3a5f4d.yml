name: Trigger auto deployment for ct-talentrack-dev

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/ct-talentrack-dev-AutoDeployTrigger-ac453e52-6ff6-433d-9e6f-d9af4c3a5f4d.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.CTTALENTRACKDEV_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.CTTALENTRACKDEV_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.CTTALENTRACKDEV_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: acrtalentrackdev.azurecr.io
          registryUsername: ${{ secrets.CTTALENTRACKDEV_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.CTTALENTRACKDEV_REGISTRY_PASSWORD }}
          containerAppName: ct-talentrack-dev
          resourceGroup: rg-talentrack-dev
          imageToBuild: acrtalentrackdev.azurecr.io/ct-talentrack-dev:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


